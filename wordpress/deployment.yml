---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  selector:
    matchLabels:
      app: wordpress
  replicas: 1
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress@sha256:06efdf7101ba434c33608712f54ac6b4cc98b8df610fa7cfbd80634efcba97c3
          ports:
            - containerPort: 80